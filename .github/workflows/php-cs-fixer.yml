name: Fix coding style

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d --no-deps php

      - name: Install dependencies
        run: docker compose exec php composer install --prefer-dist --no-interaction

      - name: Run PHP CS Fixer
        run: docker compose exec php vendor/bin/php-cs-fixer fix --diff --dry-run

      - name: Stop services
        if: always()
        run: docker compose down
